[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --disable-warnings
    --cov=jarvis
    --cov-report=term-missing
    --cov-report=html:tests/coverage_html
    -v
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (mocked but testing class interactions)
    e2e: End-to-end tests (requires actual Ollama/Hardware)
    slow: Tests that take longer than expected
    streaming: Tests for streaming functionality
