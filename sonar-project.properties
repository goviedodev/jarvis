# SonarQube project configuration
sonar.projectKey=jarvis
sonar.projectName=J.A.R.V.I.S. - Asistente de Voz
sonar.projectVersion=1.0

# Path to source directories
sonar.sources=.
sonar.exclusions=venv/**, models/**, voices/**, tests/coverage_html/**, **/__pycache__/**, *.pyc

# Path to test directories
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# Python specific
sonar.python.coverage.reportPaths=tests/coverage_html/coverage.xml
sonar.python.version=3.12

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage
sonar.python.coveragePlugin=coverage
sonar.coverage.exclusions=tests/**

# Language
sonar.language=py
